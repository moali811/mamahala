name: Weekly Blog Publish

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Triggered Vercel rebuild to publish scheduled blog posts"
